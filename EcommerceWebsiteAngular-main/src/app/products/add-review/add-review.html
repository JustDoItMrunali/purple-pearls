<div class="add-review-container">
  <h3>Write a Review</h3>
  <div class="form-group">
    <label>Rating (1-5):</label>
    <input type="number" [(ngModel)]="rating" min="1" max="5" class="form-control" />
  </div>
  <div class="form-group">
    <label>Comment:</label>
    <textarea
      [(ngModel)]="comment"
      class="form-control"
      placeholder="Share your thoughts..."
    ></textarea>
  </div>
  <button (click)="submitReview()" [disabled]="!rating || !comment">Submit Review</button>

  @if (successMessage) {
    <p class="success">{{ successMessage }}</p>
  }
  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }
</div>
