<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
  integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/>
<header class="main-header">
  <div class="brand-zone">
    <div class="logo" routerLink="/">PURPLE <span>PEARLS</span></div>
  </div>

  <div class="nav-zone">
    <nav class="main-nav">
      @if (isAdmin()) {
        <a routerLink="/admin/admin-landing" class="nav-link">HOME</a>
      }
      <a routerLink="/products" class="nav-link">PRODUCTS</a>

      <a routerLink="/dashboard" class="nav-link">DASHBOARD</a>

      @if (currentUser$ | async; as user) {
        @if (isAdmin()) {
          <a routerLink="/dashboard" class="nav-link">USER DASHBOARD</a>
        }
        <a routerLink="/order" class="nav-link">MY ORDERS</a>

        <div class="dropdown-wrapper">
          <div class="nav-link profile-trigger">
            <i class="fas fa-user-circle"></i>
            <span>ACCOUNT</span>
          </div>
          <div class="dropdown-menu">
            <div class="dropdown-header">{{ user.email }}</div>
            <a routerLink="/auth/profile">EDIT PROFILE</a>
            <a (click)="logout()" class="logout-item">LOGOUT</a>
          </div>
        </div>

        <p>Welcome , {{ user.name }}</p>
      } @else {
        <a routerLink="/auth/login" class="nav-link">LOGIN</a>
        <a routerLink="/auth/register" class="nav-link">REGISTER</a>
      }

      <a routerLink="/cart" class="nav-link cart-link">
        <i class="fas fa-shopping-bag"></i>
        <span class="badge">3</span>
      </a>
    </nav>
  </div>
</header>
