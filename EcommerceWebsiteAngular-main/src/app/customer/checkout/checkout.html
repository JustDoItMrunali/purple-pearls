
<div class="payment-selection">
  <h3>Select Payment Method</h3>
  @for (method of paymentMethods; track method) {
    <label>
      <input type="radio" name="payment" [value]="method" [(ngModel)]="selectedPayment" />
      {{ method }}
    </label>
  }
</div>

@if (!isCartOrder) {
  <div class="quantity-controls">
    <button (click)="decrement()">-</button>
    <span>{{ quantity }}</span>
    <button (click)="increment()">+</button>
  </div>

  <button class="btn-primary" (click)="placeSingleOrder()">Place Single Order</button>
} @else {
  <button class="btn-success" (click)="placeOrder()">Place Cart Order</button>
}
