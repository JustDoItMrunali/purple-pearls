<div class="form-wrapper">
  <div class="form-container">
    <h2>ADD PRODUCTS</h2>
    <form #productForm="ngForm" (ngSubmit)="addProducts(productForm)">
      <div class="group">
        <label>Product Name</label><input type="text" name="name" ngModel required />
      </div>
      <div class="group">
        <label>Description</label><textarea name="description" ngModel></textarea>
      </div>
      <div class="form-row">
        <div class="group">
          <label>Price</label><input type="number" name="price" ngModel required />
        </div>
        <div class="group">
          <label>Stock</label><input type="number" name="stock" ngModel required />
        </div>
      </div>
      <!-- <div class="group">
        <label>Sub-Category</label
        ><input
          type="number"
          name="subCategoryId"
          ngModel
          required
          placeholder="Enter Category ID"
        />
      </div> -->
      <div class="group">
        <label>Sub-Category</label>
        <select name="subCategoryId" ngModel required class="form-control">
          <option value="" disabled selected>Select a Category</option>
          @for (item of subcategory; track item.sub_category_id) {
            <option [value]="item.sub_category_id">
              {{ item.name }}
            </option>
          }
        </select>
      </div>
      <div class="group">
        <label>Product Images</label>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" />
      </div>
      <button type="submit" [disabled]="productForm.invalid" class="btn-submit">
        Upload Product
      </button>
    </form>
  </div>
</div>
