<div class="table-container">
  <h2>Customer Management</h2>

  @if (customer$ | async; as customers) {
    <table class="styled-table">
      <thead>
        <tr>
          <th>Customer Name</th>
          <th>Customer Email</th>
          <th>Account Status</th>
          <th>Actions</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        @for (customer of customers; track customer.user_id) {
          <tr>
            <td>{{ customer.name }}</td>
            <td class="email-text">{{ customer.email }}</td>
            <td>
              <span class="status-badge" [class.locked]="customer.isLocked">
                {{ customer.isLocked ? 'Locked' : 'Active' }}
              </span>
            </td>
            <td>
              <button class="btn-status" (click)="updateStatus(customer)">Edit Status</button>
            </td>
            <td>
              <button [routerLink]="['/admin/customer-detail', customer.user_id]" class="btn-view">
                View Details
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <div class="no-data">
      <p>No customers found.</p>
    </div>
  }
</div>
