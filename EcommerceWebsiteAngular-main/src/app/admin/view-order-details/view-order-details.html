@if (orderDetail$ | async; as items) {
  <table>
    @for (item of items; track item.order_item_id) {
      <tr>
        <td>{{ item.productName }}</td>
        <td>{{ item.quantity }}</td>
        <td>{{ item.priceAtPurchase | currency }}</td>
      </tr>
    }
  </table>
} @else {
  <p>Loading items...</p>
}
