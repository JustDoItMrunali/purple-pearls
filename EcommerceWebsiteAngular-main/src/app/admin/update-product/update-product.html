<div class="form-wrapper">
  <div class="form-container">
    <h2>UPDATE PRODUCTS</h2>
    <form #productForm="ngForm" (ngSubmit)="updateProduct(productForm)">
      <div class="group">
        <label>Product Name</label><input type="text" name="name" ngModel required />
      </div>
      <div class="group">
        <label>Description</label><textarea name="description" ngModel></textarea>
      </div>
      <div class="form-row">
        <div class="group">
          <label>Price</label><input type="number" name="price" ngModel required />
        </div>
        <div class="group">
          <label>Stock</label><input type="number" name="stock" ngModel required />
        </div>
      </div>
      <div class="group">
        <label>Sub-Category ID</label
        ><input
          type="number"
          name="subCategoryId"
          ngModel
          required
          placeholder="Enter Category ID"
        />
      </div>
      <!-- <div class="group">
        <label>Product Images</label>
        <input type="file" accept="image/*" (change)="onFileSelected($event)" />
      </div> -->
      <button type="submit" [disabled]="productForm.invalid" class="btn-submit">
        Update Product
      </button>
    </form>
  </div>
</div>
