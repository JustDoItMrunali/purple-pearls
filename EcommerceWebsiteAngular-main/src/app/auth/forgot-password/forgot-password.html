<form #forgotForm="ngForm" (ngSubmit)="sendOtp(forgotForm.value.email)">
  <label>Enter email</label>
  <input type="email" ngModel name="email" required />
  <button type="submit">Send Otp</button>

  @if (otp) {
    <p>OTP {{ otp }}</p>
    <p>copy the otp to reset password</p>
    <a routerLink="/auth/reset-password">Reset Password</a>
  } @else {
    <p>Nothing to show</p>
  }
</form>
