<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

<div class="auth-container">
  <div class="auth-card">
    <div class="logo">Purple<span>Pearls</span></div>

    <div class="form-content">
      <h2>Create Account</h2>

      <form #regForm="ngForm" (ngSubmit)="onRegister(regForm)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" ngModel required placeholder="John Doe" />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            name="email"
            ngModel
            required
            email
            placeholder="name@example.com"
          />
        </div>

        <div class="form-group">
          <label>Create Password</label>
          <input
            type="password"
            name="password"
            ngModel
            required
            minlength="6"
            placeholder="••••••••"
          />
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"
            ngModel
            required
            placeholder="••••••••"
          />
          @if (regForm.value.password !== regForm.value.confirmPassword && regForm.controls['confirmPassword']?.touched) {
            <small class="error-text">* Passwords do not match</small>
          }
        </div>

        <button
          type="submit"
          class="btn-auth"
          [disabled]="regForm.invalid || regForm.value.password !== regForm.value.confirmPassword"
        >
          Create Account
        </button>
      </form>

      <div class="toggle-text">
        Already have an account? <a routerLink="/auth/login">Login here</a>
      </div>
    </div>
  </div>
</div>
