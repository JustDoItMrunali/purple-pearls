<form #resetForm="ngForm" (ngSubmit)="resetPassowrd(resetForm)">
  <label>Enter email</label>
  <input type="email" ngModel name="email" required />

  <label>Enter Code</label>
  <input type="text" ngModel name="code" required />

  <label>Enter Password</label>
  <input type="text" ngModel name="newPassword" required />

  <button type="submit" routerLink="/auth/login">Reset Password</button>
</form>
