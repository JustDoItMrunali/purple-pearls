<div class="auth-container">
  <div class="auth-card">
    <div class="logo">Purple<span>Pearls</span></div>

    <div class="form-content">
      <h2>Login</h2>

      <form #loginForm="ngForm" (ngSubmit)="login(loginForm)">
        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            name="email"
            ngModel
            required
            email
            placeholder="name@example.com"
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            ngModel
            required
            minlength="6"
            #pass="ngModel"
            placeholder="••••••••"
          />
        </div>

        <button type="submit" class="btn-auth" [disabled]="loginForm.invalid">
          Login
        </button>
      </form>

      <div class="toggle-text">
        Don't have an account? 
        <a class="link" routerLink="/auth/register">Register here</a>
      </div>
      
      <div class="toggle-text">
        <a class="link" routerLink="/auth/forgot-password">Forgot password??</a>
      </div>
    </div>
  </div>
</div>
